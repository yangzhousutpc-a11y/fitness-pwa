<svg xmlns="http://www.w3.org/2000/svg" width="3400" height="1100" viewBox="0 0 3400 1100">
  <defs>
    <style>
      .bg { fill: #070b10; }
      .phone { fill: #0e1620; stroke: #2e3948; stroke-width: 1; }
      .panel { fill: #14202c; stroke: #344153; stroke-width: 1; }
      .panel2 { fill: #182635; stroke: #344153; stroke-width: 1; }
      .green-panel { fill: #0b3b22; stroke: #238b4b; stroke-width: 1; }
      .green { fill: #2bd66a; }
      .ink { fill: #f1f5f9; }
      .sub { fill: #94a3b8; }
      .muted { fill: #64748b; }
      .danger { fill: #ef4444; }
      .title { font: 800 30px Inter, Arial, sans-serif; }
      .h1 { font: 800 24px Inter, Arial, sans-serif; }
      .h2 { font: 800 18px Inter, Arial, sans-serif; }
      .body { font: 500 13px Inter, Arial, sans-serif; }
      .small { font: 700 11px Inter, Arial, sans-serif; }
      .buttonText { font: 800 14px Inter, Arial, sans-serif; fill: #062011; }
      .buttonTextSecondary { font: 800 14px Inter, Arial, sans-serif; fill: #f1f5f9; }
      .phone-label { font: 800 18px Inter, Arial, sans-serif; fill: #f1f5f9; }
      .note { font: 500 12px Inter, Arial, sans-serif; fill: #94a3b8; }
    </style>
  </defs>

  <rect class="bg" width="3400" height="1100" />

  <!-- Direction board -->
  <g id="00-direction-board" transform="translate(40 60)">
    <rect x="0" y="0" width="700" height="900" rx="24" class="panel" />
    <text x="40" y="62" class="title ink">健身 PWA UI/交互优化稿</text>
    <text x="42" y="100" class="body sub">训练优先型 · 不新增功能 · 不改数据库 · 不新增页面</text>
    <text x="42" y="155" class="h2 green">设计目标</text>
    <text x="42" y="190" class="body ink">打开后更快开始训练；训练中更快记录；练完后更清楚看到反馈。</text>

    <g transform="translate(42 235)">
      <rect width="290" height="120" rx="14" class="green-panel" />
      <text x="18" y="35" class="small green">P0</text>
      <text x="58" y="36" class="h2 ink">训练页降噪</text>
      <text x="18" y="72" class="note">当前动作、当前组、下一组和休息计时优先。</text>
      <text x="18" y="94" class="note">名师要点弱化为辅助层。</text>
    </g>
    <g transform="translate(365 235)">
      <rect width="290" height="120" rx="14" class="panel2" />
      <text x="18" y="35" class="small green">P1</text>
      <text x="58" y="36" class="h2 ink">首页快速开始</text>
      <text x="18" y="72" class="note">第一屏只服务开始/继续训练。</text>
      <text x="18" y="94" class="note">统计信息后移并降权。</text>
    </g>
    <g transform="translate(42 390)">
      <rect width="290" height="120" rx="14" class="panel2" />
      <text x="18" y="35" class="small green">P1</text>
      <text x="58" y="36" class="h2 ink">计划页选训练日</text>
      <text x="18" y="72" class="note">Day 卡片像选择器。</text>
      <text x="18" y="94" class="note">开始训练绑定当前 Day。</text>
    </g>
    <g transform="translate(365 390)">
      <rect width="290" height="120" rx="14" class="panel2" />
      <text x="18" y="35" class="small green">P2</text>
      <text x="58" y="36" class="h2 ink">历史页安静反馈</text>
      <text x="18" y="72" class="note">最近训练、日历、当天摘要分层。</text>
      <text x="18" y="94" class="note">PR 不抢主视觉。</text>
    </g>

    <text x="42" y="580" class="h2 green">全局视觉规则</text>
    <text x="42" y="620" class="body ink">绿色只用于：主按钮 / 当前组 / 已完成状态 / 休息计时器 / 关键反馈。</text>
    <text x="42" y="650" class="body ink">训练页默认记录模式，名师要点和大图不抢首屏。</text>
    <text x="42" y="680" class="body ink">展开、吸顶、输入聚焦使用 150-200ms 轻动效。</text>
  </g>

  <!-- Phone 1 Home -->
  <g id="01-home" transform="translate(820 60)">
    <text x="0" y="-18" class="phone-label">01 首页 - 训练优先</text>
    <rect width="390" height="844" rx="30" class="phone" />
    <text x="24" y="70" class="h1 ink">健身计划</text>
    <text x="24" y="96" class="body sub">今天先开始训练</text>
    <rect x="24" y="128" width="342" height="176" rx="16" class="green-panel" />
    <text x="44" y="158" class="small green">推荐训练</text>
    <text x="44" y="194" class="h1 ink">Day 1 胸 / 肩 / 三头</text>
    <text x="44" y="224" class="body sub">凯圣王-谭成义 · 5 个动作 · 25 组</text>
    <rect x="44" y="250" width="150" height="42" rx="10" fill="#2bd66a" />
    <text x="88" y="276" class="buttonText">开始训练</text>
    <rect x="208" y="250" width="118" height="42" rx="10" class="panel2" />
    <text x="240" y="276" class="buttonTextSecondary">查看计划</text>

    <text x="24" y="350" class="h2 ink">计划入口</text>
    <text x="294" y="352" class="small sub">轻量入口</text>
    <rect x="24" y="374" width="160" height="104" rx="12" class="panel" />
    <text x="40" y="402" class="small green">名师计划</text>
    <text x="40" y="432" class="body ink">三分化训练计划</text>
    <text x="40" y="458" class="small sub">3 天 · 17 动作</text>
    <rect x="206" y="374" width="160" height="104" rx="12" class="panel" />
    <text x="222" y="402" class="small sub">我的计划</text>
    <text x="222" y="432" class="body ink">自定义训练库</text>
    <text x="222" y="458" class="small sub">进入编辑</text>

    <text x="24" y="526" class="h2 ink">最近记录</text>
    <rect x="24" y="550" width="342" height="70" rx="12" class="panel" />
    <text x="44" y="578" class="body ink">Day 1 胸 / 肩 / 三头</text>
    <text x="44" y="602" class="small sub">06/26 10:51 · 完成 25 组</text>

    <text x="24" y="658" class="h2 ink">本周概览</text>
    <rect x="24" y="682" width="104" height="58" rx="12" class="panel" />
    <text x="48" y="716" class="small green">训练 1 次</text>
    <rect x="142" y="682" width="104" height="58" rx="12" class="panel" />
    <text x="161" y="716" class="small sub">完成 25 组</text>
    <rect x="260" y="682" width="104" height="58" rx="12" class="panel" />
    <text x="278" y="716" class="small sub">容量 138kg</text>
    <rect x="0" y="772" width="390" height="72" fill="#0b1118" />
    <rect x="24" y="786" width="114" height="48" rx="12" fill="#0b3b22" />
    <text x="74" y="817" class="small green">计划</text>
    <text x="180" y="817" class="small sub">动作库</text>
    <text x="306" y="817" class="small sub">历史</text>
  </g>

  <!-- Phone 2 Plan -->
  <g id="02-plan-detail" transform="translate(1260 60)">
    <text x="0" y="-18" class="phone-label">02 计划详情 - 选择训练日</text>
    <rect width="390" height="844" rx="30" class="phone" />
    <text x="24" y="70" class="h1 ink">三分化训练计划</text>
    <text x="24" y="96" class="body sub">凯圣王-谭成义</text>
    <rect x="322" y="34" width="44" height="44" rx="12" class="panel2" />
    <text x="337" y="62" class="h2 ink">←</text>
    <rect x="24" y="128" width="342" height="96" rx="14" class="panel" />
    <text x="44" y="156" class="small green">凯圣王-谭成义</text>
    <text x="44" y="186" class="h2 ink">三分化训练计划</text>
    <text x="44" y="210" class="small sub">一句话说明，视频入口降为次级链接。</text>
    <text x="24" y="272" class="h2 ink">选择训练日</text>
    <rect x="24" y="300" width="342" height="262" rx="16" class="green-panel" />
    <text x="44" y="334" class="h2 ink">Day 1 胸 / 肩 / 三头</text>
    <text x="44" y="362" class="small sub">5 个动作 · 主推举优先</text>
    <g class="small ink">
      <rect x="44" y="392" width="282" height="28" rx="8" class="panel2" /><text x="56" y="411">杠铃卧推</text><text x="280" y="411" class="sub">5 组</text>
      <rect x="44" y="426" width="282" height="28" rx="8" class="panel2" /><text x="56" y="445">上斜哑铃卧推</text><text x="280" y="445" class="sub">5 组</text>
      <rect x="44" y="460" width="282" height="28" rx="8" class="panel2" /><text x="56" y="479">双杠臂屈伸</text><text x="280" y="479" class="sub">5 组</text>
      <rect x="44" y="494" width="282" height="28" rx="8" class="panel2" /><text x="56" y="513">仰卧臂屈伸</text><text x="280" y="513" class="sub">5 组</text>
    </g>
    <rect x="44" y="534" width="282" height="40" rx="10" fill="#2bd66a" />
    <text x="146" y="559" class="buttonText">开始 Day 1</text>
    <rect x="24" y="590" width="342" height="70" rx="14" class="panel" />
    <text x="44" y="632" class="body ink">Day 2 背 / 后束 / 二头</text><text x="294" y="632" class="small sub">6 动作</text>
    <rect x="24" y="676" width="342" height="70" rx="14" class="panel" />
    <text x="44" y="718" class="body ink">Day 3 腿部</text><text x="294" y="718" class="small sub">6 动作</text>
  </g>

  <!-- Phone 3 Workout -->
  <g id="03-workout" transform="translate(1700 60)">
    <text x="0" y="-18" class="phone-label">03 训练页 - 记录模式</text>
    <rect width="390" height="844" rx="30" class="phone" />
    <text x="24" y="62" class="h1 ink">Day 1</text>
    <text x="24" y="88" class="body sub">胸 / 肩 / 三头</text>
    <rect x="322" y="34" width="44" height="44" rx="12" class="panel2" /><text x="337" y="62" class="h2 ink">←</text>
    <rect x="0" y="112" width="390" height="64" fill="#0b1118" />
    <text x="24" y="136" class="small green">DAY 1 胸 / 肩 / 三头</text>
    <text x="24" y="166" class="h1 ink">1/25 组完成</text>
    <rect x="276" y="124" width="90" height="42" rx="10" fill="#2bd66a" /><text x="306" y="150" class="buttonText">完成</text>
    <rect x="24" y="198" width="342" height="74" rx="14" fill="#073d1d" stroke="#238b4b" />
    <text x="44" y="234" class="title ink">00:47</text>
    <text x="44" y="256" class="small green">休息后录 杠铃卧推 · 第 2 组</text>
    <rect x="246" y="216" width="52" height="30" rx="15" class="panel2" /><text x="260" y="236" class="small ink">+15s</text>
    <rect x="306" y="216" width="52" height="30" rx="15" class="panel2" /><text x="320" y="236" class="small ink">跳过</text>
    <rect x="24" y="302" width="342" height="68" rx="14" class="green-panel" />
    <text x="44" y="334" class="h2 ink">杠铃卧推</text><text x="44" y="358" class="small sub">胸 / 三头 / 肩 · 杠铃</text>
    <text x="274" y="344" class="body ink">1/5</text><circle cx="334" cy="336" r="16" fill="#0b3b22"/><text x="329" y="340" class="small green">▲</text>
    <rect x="44" y="392" width="302" height="42" rx="8" class="panel" />
    <text x="60" y="418" class="small sub">名师要点 · 轻量辅助，可展开查看动作图</text>
    <text x="48" y="470" class="small sub">组       重量                 次数                 完成</text>
    <g transform="translate(36 492)">
      <rect width="318" height="44" rx="10" fill="#0b3b22" stroke="#238b4b" /><text x="18" y="28" class="h2 green">1</text><rect x="58" y="6" width="80" height="32" rx="8" fill="#0b3b22" /><text x="91" y="27" class="body green">60</text><rect x="154" y="6" width="80" height="32" rx="8" fill="#0b3b22" /><text x="187" y="27" class="body green">10</text><rect x="262" y="6" width="32" height="32" rx="8" fill="#2bd66a" /><text x="273" y="27" class="body" fill="#062011">✓</text>
    </g>
    <g transform="translate(36 544)">
      <rect width="318" height="44" rx="10" fill="#0b3b22" stroke="#238b4b" /><text x="18" y="28" class="h2 green">2</text><rect x="58" y="6" width="80" height="32" rx="8" fill="#14202c" stroke="#2bd66a" /><text x="91" y="27" class="body ink">60</text><rect x="154" y="6" width="80" height="32" rx="8" fill="#14202c" stroke="#2bd66a" /><text x="187" y="27" class="body ink">10</text><rect x="262" y="6" width="32" height="32" rx="8" class="panel2" /><text x="273" y="27" class="body sub">○</text>
    </g>
    <g transform="translate(36 596)">
      <rect width="318" height="44" rx="10" class="panel" /><text x="18" y="28" class="h2 ink">3</text><rect x="58" y="6" width="80" height="32" rx="8" class="panel2" /><text x="95" y="27" class="body sub">5</text><rect x="154" y="6" width="80" height="32" rx="8" class="panel2" /><text x="191" y="27" class="body sub">2</text><rect x="262" y="6" width="32" height="32" rx="8" class="panel2" /><text x="273" y="27" class="body sub">○</text>
    </g>
  </g>

  <!-- Phone 4 History -->
  <g id="04-history" transform="translate(2140 60)">
    <text x="0" y="-18" class="phone-label">04 历史页 - 安静反馈</text>
    <rect width="390" height="844" rx="30" class="phone" />
    <text x="24" y="70" class="h1 ink">历史</text>
    <text x="24" y="96" class="body sub">训练回看</text>
    <rect x="24" y="128" width="342" height="92" rx="14" class="green-panel" />
    <text x="44" y="156" class="small green">最近训练</text>
    <text x="44" y="186" class="h2 ink">Day 1 胸 / 肩 / 三头</text>
    <text x="44" y="210" class="small sub">06/26 · 完成 25 组 · 容量 138kg</text>
    <text x="24" y="268" class="h2 ink">训练日历</text>
    <rect x="24" y="292" width="342" height="220" rx="14" class="panel" />
    <g class="small sub">
      <text x="50" y="320">一</text><text x="94" y="320">二</text><text x="138" y="320">三</text><text x="182" y="320">四</text><text x="226" y="320">五</text><text x="270" y="320">六</text><text x="314" y="320">日</text>
    </g>
    <g class="small sub">
      <circle cx="58" cy="354" r="15" class="panel2"/><text x="54" y="358">1</text>
      <circle cx="102" cy="354" r="15" class="panel2"/><text x="98" y="358">2</text>
      <circle cx="146" cy="354" r="15" class="panel2"/><text x="142" y="358">3</text>
      <circle cx="190" cy="354" r="15" class="panel2"/><text x="186" y="358">4</text>
      <circle cx="234" cy="354" r="15" class="panel2"/><text x="230" y="358">5</text>
      <circle cx="278" cy="354" r="15" class="panel2"/><text x="274" y="358">6</text>
      <circle cx="322" cy="354" r="15" class="panel2"/><text x="318" y="358">7</text>
      <circle cx="278" cy="430" r="15" fill="#0b3b22" stroke="#238b4b"/><text x="270" y="434" class="green">24</text>
      <circle cx="58" cy="468" r="15" fill="#2bd66a"/><text x="50" y="472" fill="#062011">26</text>
    </g>
    <text x="24" y="560" class="h2 ink">所选日期</text>
    <rect x="24" y="584" width="342" height="86" rx="14" class="panel" />
    <text x="44" y="616" class="body ink">Day 1 胸 / 肩 / 三头</text>
    <text x="44" y="642" class="small sub">完成 25/25 组 · 5 个动作</text>
    <text x="24" y="718" class="h2 ink">个人最好成绩</text>
    <rect x="24" y="742" width="342" height="42" rx="10" class="panel" /><text x="44" y="768" class="body green">杠铃卧推 60kg</text>
    <rect x="0" y="794" width="390" height="50" fill="#0b1118" /><text x="74" y="824" class="small sub">计划</text><text x="180" y="824" class="small sub">动作库</text><text x="306" y="824" class="small green">历史</text>
  </g>

  <!-- Component board -->
  <g id="05-component-rules" transform="translate(2580 60)">
    <rect x="0" y="0" width="760" height="900" rx="24" class="panel" />
    <text x="40" y="62" class="title ink">组件与交互规范</text>
    <text x="42" y="100" class="body sub">只调整视觉层级、布局、状态和动效；不新增功能。</text>
    <text x="42" y="160" class="h2 green">状态规则</text>
    <text x="42" y="198" class="body ink">已完成组：绿色克制高亮 + ✓；当前组：边框和背景强调；普通组：低噪音。</text>
    <text x="42" y="228" class="body ink">休息计时器：作为训练辅助条出现，显示下一组，不做弹窗。</text>
    <text x="42" y="258" class="body ink">名师要点：默认辅助层，不抢首屏记录区。</text>
    <text x="42" y="330" class="h2 green">验收检查</text>
    <text x="42" y="370" class="body ink">首页首屏能明确看到主训练入口。</text>
    <text x="42" y="400" class="body ink">计划页首屏能看到 Day 选择和开始训练路径。</text>
    <text x="42" y="430" class="body ink">训练页首屏能看到当前动作和至少 2-3 组输入行。</text>
    <text x="42" y="460" class="body ink">输入重量或次数时，页面不明显跳动。</text>
    <text x="42" y="490" class="body ink">手机 375、390、430 宽度均无横向滚动。</text>
  </g>
</svg>
